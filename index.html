let diggerInterval    = null;
let diggerGain        = null;
let diggerFilter      = null;  // tone shaper — die controls this
let currentDiggerNode = null;
let currentAudioBuf   = null;  // store decoded buffer so we can respawn
let diggerMode        = 'idle';
let currentWikiIdx    = -1;
let diggerFetchAbort  = null;

// ---- DIGGER EFFECTS CHAIN ----
let diggerFxChain = null;

// All presets include gate:true — digger always has tempo-locked rhythm
const FX_PRESETS = [
  { name: 'GATED',      delay: false, gate: true,  crush: false, duck: false, lofi: false },
  { name: 'TAPE GATE',  delay: true,  gate: true,  crush: false, duck: false, lofi: true  },
  { name: 'CHOPPED',    delay: false, gate: true,  crush: false, duck: true,  lofi: false },
  { name: 'CRUSH GATE', delay: false, gate: true,  crush: true,  duck: false, lofi: false },
  { name: 'MANGLED',    delay: true,  gate: true,  crush: true,  duck: false, lofi: true  },
  { name: 'GHOST',      delay: true,  gate: true,  crush: false, duck: true,  lofi: true  },
  { name: 'WRECKED',    delay: true,  gate: true,  crush: true,  duck: true,  lofi: true  },
  { name: 'SIDECHAIN',  delay: false, gate: true,  crush: false, duck: true,  lofi: true  },
];
let currentFxPreset = 0;

function teardownFxChain() {
  if (!diggerFxChain) return;
  try { diggerFxChain.nodes.forEach(n => { try { n.disconnect(); } catch(e){} }); } catch(e) {}
  // gateTimer is now an object with .clear() — duck is still a setInterval id
  if (diggerFxChain.gateTimer && diggerFxChain.gateTimer.clear) diggerFxChain.gateTimer.clear();
  if (diggerFxChain.duckTimer) clearInterval(diggerFxChain.duckTimer);
  diggerFxChain = null;
}

function buildFxChain(presetIdx) {
  teardownFxChain();
  if (!ctx || !diggerGain) return null;
  const preset = FX_PRESETS[presetIdx % FX_PRESETS.length];
  const nodes = [];
  const bps = 60 / state.tempo;

  const fxIn = ctx.createGain(); fxIn.gain.value = 1; nodes.push(fxIn);
  let current = fxIn;

  // BIT CRUSHER
  if (preset.crush) {
    const crushNode = ctx.createWaveShaper();
    const bits = 4 + Math.floor(Math.random() * 4);
    const steps = Math.pow(2, bits);
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i/127.5)-1; curve[i] = Math.round(x*steps)/steps; }
    crushNode.curve = curve;
    current.connect(crushNode); current = crushNode; nodes.push(crushNode);
  }

  // TEMPO DELAY
  if (preset.delay) {
    const delayTime = bps * (Math.random() < 0.5 ? 0.5 : 0.75);
    const delayNode = ctx.createDelay(2.0); delayNode.delayTime.value = delayTime;
    const delayFb   = ctx.createGain(); delayFb.gain.value = 0.35 + Math.random()*0.25;
    const delayWet  = ctx.createGain(); delayWet.gain.value = 0.45;
    const delayDry  = ctx.createGain(); delayDry.gain.value = 0.7;
    const delayLP   = ctx.createBiquadFilter(); delayLP.type='lowpass'; delayLP.frequency.value=3000;
    const delaySum  = ctx.createGain(); delaySum.gain.value = 1;
    current.connect(delayDry); current.connect(delayNode);
    delayNode.connect(delayLP); delayLP.connect(delayFb); delayFb.connect(delayNode);
    delayNode.connect(delayWet); delayDry.connect(delaySum); delayWet.connect(delaySum);
    nodes.push(delayNode, delayFb, delayWet, delayDry, delayLP, delaySum);
    current = delaySum;
  }

  // TEMPO GATE — reads tempo live each tick so it tracks BPM changes
  let gateTimer = null;
  if (preset.gate) {
    const gateNode = ctx.createGain(); gateNode.gain.value = 1;
    // Pick from several rhythmic patterns — straight, syncopated, dotted
    const patterns = [
      [1,0,1,0, 1,0,1,0],   // straight 8ths
      [1,1,0,1, 1,0,0,1],   // syncopated
      [1,0,0,1, 0,1,0,0],   // sparse
      [1,0,1,1, 0,1,1,0],   // dense
      [1,0,0,0, 1,0,1,0],   // half-note + pickup
    ];
    const gatePat = patterns[Math.floor(Math.random() * patterns.length)];
    let gateStep = 0;
    let lastInterval = null;

    // Self-adjusting scheduler — recalculates step duration each tick from live tempo
    function scheduleGateStep() {
      if (!gateNode || !ctx || !diggerFxChain) return;
      const liveBps = 60 / state.tempo;
      const stepMs = (liveBps / 2) * 1000; // 8th note in ms
      const on = gatePat[gateStep % gatePat.length];
      const t = ctx.currentTime;
      gateNode.gain.cancelScheduledValues(t);
      gateNode.gain.setValueAtTime(gateNode.gain.value, t);
      // Slightly softer gate open (0.92) for a bit of groove breathiness
      gateNode.gain.linearRampToValueAtTime(on ? 0.95 : 0.015, t + 0.004);
      gateStep++;
      lastInterval = setTimeout(scheduleGateStep, stepMs);
    }
    scheduleGateStep();
    // Store cancel fn on gateTimer so teardownFxChain can kill it
    gateTimer = { clear: () => { if (lastInterval) clearTimeout(lastInterval); lastInterval = null; gateNode.gain.setValueAtTime(1, ctx.currentTime); } };
    current.connect(gateNode); current = gateNode; nodes.push(gateNode);
  }

  // DRUM DUCKING
  let duckTimer = null;
  if (preset.duck) {
    const duckNode = ctx.createGain(); duckNode.gain.value = 1;
    duckTimer = setInterval(() => {
      if (!duckNode||!ctx||!analyserNodes.drums) return;
      const data = new Uint8Array(analyserNodes.drums.frequencyBinCount);
      analyserNodes.drums.getByteTimeDomainData(data);
      let rms = 0;
      for (let i=0;i<data.length;i++){const s=(data[i]-128)/128;rms+=s*s;}
      rms = Math.sqrt(rms/data.length);
      const reduction = Math.max(0.08, 1 - rms*6);
      const t = ctx.currentTime;
      duckNode.gain.cancelScheduledValues(t);
      duckNode.gain.setValueAtTime(duckNode.gain.value, t);
      duckNode.gain.linearRampToValueAtTime(reduction, t+0.015);
      duckNode.gain.linearRampToValueAtTime(1, t+0.1);
    }, 20);
    current.connect(duckNode); current = duckNode; nodes.push(duckNode);
  }

  // LO-FI TELEPHONE
  if (preset.lofi) {
    const loHP = ctx.createBiquadFilter(); loHP.type='highpass'; loHP.frequency.value=300+Math.random()*500;
    const loLP = ctx.createBiquadFilter(); loLP.type='lowpass';  loLP.frequency.value=2000+Math.random()*2000;
    current.connect(loHP); loHP.connect(loLP); current = loLP;
    nodes.push(loHP, loLP);
  }

  current.connect(diggerGain);
  diggerFxChain = { nodes, gateTimer, duckTimer, preset: preset.name, fxIn };
  return fxIn;
}

function getDiggerDest() {
  return (diggerFxChain && diggerFxChain.fxIn) ? diggerFxChain.fxIn : (diggerGain || analyserNodes.digger);
}

function reinterpretDiggerFx() {
  // Pick a different preset from current one
  let next = Math.floor(Math.random() * FX_PRESETS.length);
  if (next === currentFxPreset && FX_PRESETS.length > 1) next = (next + 1) % FX_PRESETS.length;
  currentFxPreset = next;
  buildFxChain(currentFxPreset);
  // Respawn with a new random loop point from the same buffer
  if (currentAudioBuf && diggerMode === 'wiki') {
    spawnFromBuffer(currentAudioBuf);
  }
  return FX_PRESETS[currentFxPreset].name;
}

// Spawn a fresh BufferSourceNode from a decoded AudioBuffer
// Pick a musically interesting loop point within the buffer
// Looks for a consistent-energy region to avoid dead silence or pure noise
function pickLoopPoint(audioBuf, loopBars) {
  const sr       = audioBuf.sampleRate;
  const beatSec  = 60 / state.tempo;
  const loopSec  = beatSec * beatsPerMeasure() * loopBars;
  const loopSamps = Math.floor(loopSec * sr);
  const totalSamps = audioBuf.length;

  if (loopSamps >= totalSamps) {
    return { start: 0, end: totalSamps / sr };
  }

  // Scan candidate start points in 10% steps across middle 60% of file
  // (avoid intros/outros which are often quiet or noisy)
  const scanStart = Math.floor(totalSamps * 0.15);
  const scanEnd   = Math.floor(totalSamps * 0.75);
  const step      = Math.floor(totalSamps * 0.10);
  const ch        = audioBuf.getChannelData(0);

  let bestStart = scanStart;
  let bestScore = -1;

  for (let s = scanStart; s < scanEnd; s += step) {
    if (s + loopSamps > totalSamps) break;
    // RMS of this window
    let rms = 0;
    const checkLen = Math.min(loopSamps, 4096);
    for (let i = 0; i < checkLen; i++) {
      const v = ch[s + i] || 0;
      rms += v * v;
    }
    rms = Math.sqrt(rms / checkLen);
    // Prefer regions with moderate energy (not silence, not clipping)
    const score = rms > 0.02 && rms < 0.7 ? rms : 0;
    if (score > bestScore) { bestScore = score; bestStart = s; }
  }

  return {
    start: bestStart / sr,
    end:   (bestStart + loopSamps) / sr,
  };
}

function spawnFromBuffer(audioBuf) {
  if (currentDiggerNode) { try { currentDiggerNode.stop(); } catch(e) {} }

  // Loop length: 1, 2, or 4 bars — weighted toward shorter for more hypnotic feel
  // Density controls loop length: I=long (4-8 bars), II=medium (1-4), III=short (0.5-1)
  const c = state.musicians.digger.complexity;
  const barOptions = c === 1 ? [4, 4, 8] : c === 2 ? [1, 2, 2, 4] : [0.5, 0.5, 1];
  const loopBars   = barOptions[Math.floor(Math.random() * barOptions.length)];
  const loopPoint  = pickLoopPoint(audioBuf, loopBars);

  const src = ctx.createBufferSource();
  src.buffer    = audioBuf;
  src.loop      = true;
  src.loopStart = loopPoint.start;
  src.loopEnd   = loopPoint.end;

  src.connect(getDiggerDest());
  // Start playback from the loop start point
  src.start(0, loopPoint.start);
  currentDiggerNode = src;

  // Store loop info for display
  currentDiggerNode._loopBars = loopBars;
}

// ---- WIKIMEDIA FETCH + DECODE ----

async function tryFetchWikiRecord(idx) {
  if (!state.musicians.digger.playing) return;
  const entry = WIKI_CRATE[idx];
  if (!entry) { fallbackToSynth(); return; }

  setStatus('digger', '⊙ ' + entry.label + '...');

  // Abort any in-flight fetch
  if (diggerFetchAbort) diggerFetchAbort.abort();
  diggerFetchAbort = new AbortController();

  try {
    const resp = await fetch(entry.url, {
      signal: diggerFetchAbort.signal,
      // No credentials, no mode override — plain fetch, CORS headers on upload.wikimedia.org handle it
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const arrayBuf = await resp.arrayBuffer();
    if (!state.musicians.digger.playing) return; // bailed while fetching

    const audioBuf = await ctx.decodeAudioData(arrayBuf);
    if (!state.musicians.digger.playing) return;

    // Stop existing node
    // Store buffer so we can respawn without re-fetching
    currentAudioBuf = audioBuf;
    diggerMode = 'wiki';
    currentWikiIdx = idx;

    // Fade in diggerGain
    const targetVol = 0.32; // fixed volume — density now controls loop length, not volume
    diggerGain.gain.cancelScheduledValues(ctx.currentTime);
    diggerGain.gain.setValueAtTime(diggerGain.gain.value || 0.0001, ctx.currentTime);
    diggerGain.gain.linearRampToValueAtTime(targetVol, ctx.currentTime + 3);

    // Reset digger filter to clean on new record
    if (diggerFilter) {
      diggerFilter.type = 'lowpass';
      diggerFilter.frequency.setTargetAtTime(18000, ctx.currentTime, 0.1);
      diggerFilter.Q.value = 0.3;
    }
    spawnFromBuffer(audioBuf);
    setStatus('digger', '▸ ' + entry.label);

  } catch(e) {
    if (e.name === 'AbortError') return; // intentional abort
    console.warn('Wiki fetch failed:', entry.label, e.message);
    fallbackToSynth();
  }
}

function fallbackToSynth() {
  // Instead of falling back to synth noise, cleanly shut the digger off
  // User will need to hit play again to load a new sample
  stopMusician('digger');
  setStatus('digger', '— NO SIGNAL —');
}

function flipRecord() {
  if (!state.musicians.digger.playing) return;

  // Always try a new wiki record — no synth fallback
  let next = Math.floor(Math.random() * WIKI_CRATE.length);
  if (next === currentWikiIdx && WIKI_CRATE.length > 1) next = (next + 1) % WIKI_CRATE.length;

  // Fade out current
  if (diggerGain) {
    diggerGain.gain.cancelScheduledValues(ctx.currentTime);
    diggerGain.gain.setValueAtTime(diggerGain.gain.value, ctx.currentTime);
    diggerGain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
  }
  if (currentDiggerNode) { try { setTimeout(() => { try { currentDiggerNode.stop(); } catch(e){} }, 1600); } catch(e){} }
  setTimeout(() => tryFetchWikiRecord(next), 800);
}

// ---- SYNTH TEXTURE FALLBACK ----

function makeVinylCrackle(dest, dur) {
  const p = instrParams.digger;
  const bufSize = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = Math.random() < p.clickDensity
      ? (Math.random() - 0.5) * 0.8
      : (Math.random() - 0.5) * 0.018;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = p.filterFreq;
  filt.Q.value = p.filterQ;
  src.connect(filt); filt.connect(dest);
  return src;
}

function makeRainTexture(dest, dur) {
  const src = ctx.createBufferSource();
  const bufSize = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() - 0.5) * 0.15;
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 3000;
  src.connect(filt); filt.connect(dest);
  return src;
}

function makeStaticTexture(dest, dur) {
  const p = instrParams.digger;
  const src = ctx.createBufferSource();
  const bufSize = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  let v = 0;
  for (let i = 0; i < bufSize; i++) { v = v * 0.95 + (Math.random() - 0.5) * 0.2; data[i] = v; }
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = p.filterFreq * 0.6; filt.Q.value = p.filterQ * 1.5;
  src.connect(filt); filt.connect(dest);
  return src;
}

function makeWindTexture(dest, dur) {
  const src = ctx.createBufferSource();
  const bufSize = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  let v = 0;
  for (let i = 0; i < bufSize; i++) { v = v * 0.999 + (Math.random() - 0.5) * 0.015; data[i] = v; }
  src.buffer = buf; src.connect(dest);
  return src;
}

function spawnDiggerTexture() {
  if (!state.musicians.digger.playing) return;
  const dest = getDiggerDest();
  const dur = 5 + Math.random() * 10;
  if (currentDiggerNode) { try { currentDiggerNode.stop(); } catch(e){} }
  const pick = ['vinyl','rain','static','wind','vinyl','vinyl'];
  const type = pick[Math.floor(Math.random() * pick.length)];
  let src;
  switch(type) {
    case 'rain':   src = makeRainTexture(dest, dur); break;
    case 'static': src = makeStaticTexture(dest, dur); break;
    case 'wind':   src = makeWindTexture(dest, dur); break;
    default:       src = makeVinylCrackle(dest, dur);
  }
  if (diggerGain) {
    const vol = 0.32; // fixed volume — density controls loop length
    diggerGain.gain.cancelScheduledValues(ctx.currentTime);
    diggerGain.gain.setValueAtTime(diggerGain.gain.value || 0.0001, ctx.currentTime);
    diggerGain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 3);
  }
  src.start();
  currentDiggerNode = src;
  setStatus('digger', type.toUpperCase() + ' ▸ ' + Math.round(dur) + 's');
}

function startDigger() {
  if (!diggerGain) {
    diggerGain = ctx.createGain();
    diggerGain.gain.value = 0.0001;

    // Tone shaper — die randomises filter type/freq/Q on the live signal
    diggerFilter = ctx.createBiquadFilter();
    diggerFilter.type = 'lowpass';
    diggerFilter.frequency.value = 18000; // wide open = clean by default
    diggerFilter.Q.value = 0.3;

    diggerGain.connect(diggerFilter);
    diggerFilter.connect(analyserNodes.digger);
  }
  // Pick a random starting preset — always gated from the first note
  currentFxPreset = Math.floor(Math.random() * FX_PRESETS.length);
  buildFxChain(currentFxPreset);

  // Load a random wiki record — plays looped until user stops or ↻ flips it
  const idx = Math.floor(Math.random() * WIKI_CRATE.length);
  tryFetchWikiRecord(idx);
}

function stopDigger() {
  clearInterval(diggerInterval);
  diggerInterval = null;
  if (diggerFetchAbort) { diggerFetchAbort.abort(); diggerFetchAbort = null; }
  if (diggerGain) {
    diggerGain.gain.cancelScheduledValues(ctx.currentTime);
    diggerGain.gain.setValueAtTime(diggerGain.gain.value, ctx.currentTime);
    diggerGain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 2);
  }
  if (currentDiggerNode) {
    try { currentDiggerNode.stop(ctx.currentTime + 2.1); } catch(e){}
    currentDiggerNode = null;
  }
  currentWikiIdx = -1;
  currentAudioBuf = null;
  diggerMode = 'idle';
  teardownFxChain();
}


// ============================================================
// MUSICIAN CONTROL
// ============================================================
function toggleMusician(m) {
  const ms = state.musicians[m];
  if (!ms.playing) {
    startMusician(m);
  } else {
    stopMusician(m);
  }
}

function startMusician(m) {
  const ms = state.musicians[m];
  ms.playing = true;
  ms.state = 'finding';

  const el = document.getElementById('m-' + m);
  el.classList.remove('locked');
  el.classList.add('finding');
  setStatus(m, '▸ FINDING IT...');

  const btn = document.getElementById('btn-' + m);
  btn.classList.add('playing');
  const icon = document.getElementById('icon-' + m);

  // Show stop icon
  icon.setAttribute('points', '4,4 12,4 12,12 4,12');
  icon.setAttribute('fill', getAccentColor(m));

  if (!schedulerTimer && m !== 'digger') startScheduler();
  if (m === 'digger') startDigger();

  // "Finding it" period — brief, one bar
  const barDur = beatDuration() * beatsPerMeasure() * 1000;
  setTimeout(() => {
    if (ms.playing) {
      ms.state = 'locked';
      el.classList.remove('finding');
      el.classList.add('locked');
      setStatus(m, getLockedStatus(m));
    }
  }, barDur);
}

function stopMusician(m) {
  const ms = state.musicians[m];
  ms.playing = false;
  ms.state = 'off';

  const el = document.getElementById('m-' + m);
  el.classList.remove('locked', 'finding');

  const btn = document.getElementById('btn-' + m);
  btn.classList.remove('playing');
  const icon = document.getElementById('icon-' + m);
  icon.setAttribute('points', '5,2 14,8 5,14');
  icon.setAttribute('fill', '#666');

  setStatus(m, m === 'digger' ? '— NO SIGNAL —' : '— OFFLINE —');
  if (m === 'digger') stopDigger();
  stopSchedulerIfNone();
}

function getLockedStatus(m) {
  const statuses = {
    drums:  '◉ DRUMS LOCKED',
    bass:   '◉ SAW ARP LOCKED',
    keys:   '◉ RHODES LOCKED',
    digger: '◉ DIGGING...'
  };
  return statuses[m];
}

function getAccentColor(m) {
  const colors = { drums: '#c8a84b', bass: '#4bc8a8', keys: '#c84b6e', digger: '#7b4bc8' };
  return colors[m];
}

function setStatus(m, text) {
  document.getElementById('status-' + m).textContent = text;
}

// ============================================================
// DIE ANIMATION
// ============================================================
const DIE_FACES = {
  1: [[10, 10]],
  2: [[5.5, 5.5], [14.5, 14.5]],
  3: [[5.5, 5.5], [10, 10], [14.5, 14.5]],
  4: [[5.5, 5.5], [14.5, 5.5], [5.5, 14.5], [14.5, 14.5]],
  5: [[5.5, 5.5], [14.5, 5.5], [10, 10], [5.5, 14.5], [14.5, 14.5]],
  6: [[5.5, 5], [14.5, 5], [5.5, 10], [14.5, 10], [5.5, 15], [14.5, 15]],
};

function renderDieFace(m, face) {
  const g = document.getElementById('die-' + m);
  if (!g) return;
  const dots = DIE_FACES[face] || DIE_FACES[1];
  g.innerHTML = dots.map(([cx, cy]) =>
    `<circle cx="${cx}" cy="${cy}" r="1.6" fill="currentColor"/>`
  ).join('');
}

function rollDie(m, finalFace, onDone) {
  const btn = document.getElementById('tweak-' + m);
  if (!btn) return;
  const sequence = [1,2,3,4,5,6,4,3,5,2,6,1,3,5,4,6,2]; // shuffled walk
  const totalFrames = 10 + Math.floor(Math.random() * 6); // 10-15 frames
  let frame = 0;

  function nextFrame() {
    if (frame < totalFrames) {
      // Pick from sequence, skip the final face for the last few frames
      const face = sequence[frame % sequence.length];
      renderDieFace(m, face);

      // Trigger shake animation by toggling class
      btn.classList.remove('rolling');
      void btn.offsetWidth; // reflow to restart animation
      btn.classList.add('rolling');

      // Slow down toward end — exponential easing
      const progress = frame / totalFrames;
      const delay = 60 + Math.pow(progress, 1.8) * 220;
      frame++;
      setTimeout(nextFrame, delay);
    } else {
      // Land on final face
      renderDieFace(m, finalFace);
      btn.classList.remove('rolling');
      if (onDone) onDone();
    }
  }

  nextFrame();
}

// Initialise all dice to face 1 once DOM is ready
function initDice() {
  ['drums', 'bass', 'keys', 'digger'].forEach(m => renderDieFace(m, 1));
}

function tweakSound(m) {
  const r  = (lo, hi) => lo + Math.random() * (hi - lo);
  const ri = (lo, hi) => Math.floor(lo + Math.random() * (hi - lo + 1));
  const finalFace = 1 + Math.floor(Math.random() * 6);

  // Apply parameter changes immediately (audio updates on next scheduled note)
  let statusMsg = '';
  if (m === 'drums') {
    instrParams.drums.kickDecay   = r(0.2, 1.0);
    instrParams.drums.kickPitch   = r(180, 360);
    instrParams.drums.snareSnap   = r(0.05, 0.3);
    instrParams.drums.hatDensity  = r(0.1, 0.9);
    instrParams.drums.distAmount  = r(10, 180);
    statusMsg = 'DIALED IN';
  } else if (m === 'bass') {
    // Pick a new random voice
    const voices = ['upright', 'moog', 'sub', 'saw'];
    currentBassVoice = voices[Math.floor(Math.random() * voices.length)];
    // Randomise params for all voices so each roll sounds different
    instrParams.bass.sustain       = r(0.3, 0.95);
    instrParams.bass.attackNoise   = r(0.1, 0.9);
    instrParams.bass.bodyResonance = r(2, 10);
    instrParams.bass.moogResonance = r(1.5, 14);
    instrParams.bass.moogEnvAmount = r(3, 16);
    instrParams.bass.moogEnvDecay  = r(0.04, 0.4);
    instrParams.bass.subPitchEnv   = r(1.3, 3.5);
    instrParams.bass.subDecay      = r(0.15, 1.0);
    instrParams.bass.subClick      = r(0.2, 1.0);
    instrParams.bass.sawDetune     = r(2, 20);
    statusMsg = currentBassVoice.toUpperCase();
  } else if (m === 'keys') {
    instrParams.keys.modRatio     = ri(1, 13);
    instrParams.keys.modDepth     = r(0.1, 0.75);
    instrParams.keys.tremRate     = r(2, 12);
    instrParams.keys.tremDepth    = r(0.01, 0.14);
    instrParams.keys.noteLength   = r(0.8, 2.4);
    statusMsg = 'NEW TONE';
  } else if (m === 'digger') {
    // Randomise the live diggerFilter — audibly reshapes the record
    if (diggerFilter) {
      const filterTypes = ['lowpass','highpass','bandpass','lowpass','lowpass'];
      const ft = filterTypes[Math.floor(Math.random() * filterTypes.length)];
      diggerFilter.type = ft;
      diggerFilter.frequency.setTargetAtTime(200 + Math.random() * 7000, ctx.currentTime, 0.1);
      diggerFilter.Q.value = 0.3 + Math.random() * 6;
    }
    // Randomise playback rate on live node — subtle pitch shift (0.85–1.2x)
    if (currentDiggerNode) {
      const rate = 0.85 + Math.random() * 0.35;
      currentDiggerNode.playbackRate.setTargetAtTime(rate, ctx.currentTime, 0.15);
    }
    // Pick a new loop point from the same buffer
    const fxName = reinterpretDiggerFx();
    instrParams.digger.clickDensity = r(0.0003, 0.012);
    statusMsg = fxName;
  }

  // Roll the die — status updates when it lands
  rollDie(m, finalFace, () => {
    setStatus(m, finalFace + ' · ' + statusMsg);
    setTimeout(() => {
      if (state.musicians[m].playing) setStatus(m, getLockedStatus(m));
    }, 1800);
  });
}

function reinterpret(m) {
  // Flash the button
  const btn = document.getElementById('reint-' + m);
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 400);

  if (m === 'drums') {
    // Pick from 5 total variants (0-2 = complexity patterns, 3-4 = bonus grooves)
    state.musicians.drums._rerollIdx = Math.floor(Math.random() * 5);
    setStatus('drums', '↻ NEW GROOVE');
    setTimeout(() => {
      if (state.musicians.drums.playing) setStatus('drums', getLockedStatus('drums'));
    }, 1200);
  } else if (m === 'bass') {
    // Immediate key/mode change — skip the wait, apply now
    scheduleAutoJamChange(true);
    generateBassPatternRandom();
    setStatus('bass', '↻ MODULATING');
    setTimeout(() => {
      if (state.musicians.bass.playing) setStatus('bass', getLockedStatus('bass'));
    }, 1400);
  } else if (m === 'keys') {
    scheduleAutoJamChange(true);
    generateKeysPatternRandom();
    setStatus('keys', '↻ MODULATING');
    setTimeout(() => {
      if (state.musicians.keys.playing) setStatus('keys', getLockedStatus('keys'));
    }, 1400);
  } else if (m === 'digger') {
    if (diggerMode === 'wiki' && currentAudioBuf) {
      if (Math.random() < 0.5) {
        spawnFromBuffer(currentAudioBuf);
        setStatus('digger', '↻ NEW CUE');
      } else {
        flipRecord();
        setStatus('digger', '⊙ FLIPPING...');
      }
    } else {
      // Nothing loaded — try fetching a fresh record
      const idx = Math.floor(Math.random() * WIKI_CRATE.length);
      tryFetchWikiRecord(idx);
      setStatus('digger', '⊙ SEARCHING...');
    }
    setTimeout(() => { if (state.musicians.digger.playing) setStatus('digger', getLockedStatus('digger')); }, 2000);
  }
}

function generateBassPatternRandom() {
  // On reinterpret: pick from a different complexity tier for variety
  const c = state.musicians.bass.complexity;
  const allPools = [...BASS_PATTERNS[1], ...BASS_PATTERNS[2], ...BASS_PATTERNS[3]];
  const template = allPools[Math.floor(Math.random() * allPools.length)];
  const len = beatsPerMeasure();
  bassPattern = Array.from({ length: len }, (_, i) => template[i % template.length]);
}

function generateKeysPatternRandom() {
  // Pick from any style pool for variety
  const allPools = [...KEYS_STYLES[1], ...KEYS_STYLES[2], ...KEYS_STYLES[3]];
  const styleFn  = allPools[Math.floor(Math.random() * allPools.length)];
  keysPattern    = styleFn(beatsPerMeasure());
}


function setComplexity(m, level) {
  state.musicians[m].complexity = level;
  const btns = document.querySelectorAll(`[data-m="${m}"] .cplx-btn`);
  btns.forEach((b, i) => b.classList.toggle('active', i+1 === level));
  // Regenerate patterns
  if (m === 'bass') generateBassPattern();
  if (m === 'keys') generateKeysPattern();
}

function setTimeSig(sig) {
  const parts = sig.split('/');
  state.timeSig = { num: parseInt(parts[0]), den: parseInt(parts[1]) };
  document.querySelectorAll('#timesig-ctrl button').forEach(b => {
    b.classList.toggle('active', b.textContent === sig);
  });
  generateBassPattern();
  generateKeysPattern();
}

// ============================================================
// KNOBS
// ============================================================
const knobConfigs = {
  'knob-tempo':  { min: 60, max: 200, value: 120, valId: 'val-tempo',  fmt: v => Math.round(v), onChange: v => { state.tempo = v; } },
  'knob-swing':  { min: 0, max: 1, value: 0.5, valId: 'val-swing', fmt: v => Math.round(v*100)+'%', onChange: v => { state.swing = v; } },
};

function initKnobs() {
  Object.entries(knobConfigs).forEach(([id, cfg]) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    drawKnob(canvas, cfg);
    makeKnobInteractive(canvas, cfg);
  });
}

function drawKnob(canvas, cfg) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 72 * dpr; canvas.height = 72 * dpr;
  canvas.style.width = '36px'; canvas.style.height = '36px';
  const ctx2 = canvas.getContext('2d');
  ctx2.scale(dpr, dpr);

  const cx = 18, cy = 18, r = 14;
  const startAngle = Math.PI * 0.75;
  const endAngle = Math.PI * 2.25;
  const t = (cfg.value - cfg.min) / (cfg.max - cfg.min);
  const angle = startAngle + t * (endAngle - startAngle);

  ctx2.clearRect(0, 0, 36, 36);

  // Track
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, startAngle, endAngle);
  ctx2.strokeStyle = '#222';
  ctx2.lineWidth = 3;
  ctx2.lineCap = 'round';
  ctx2.stroke();

  // Value arc
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, startAngle, angle);
  ctx2.strokeStyle = '#c8a84b';
  ctx2.lineWidth = 3;
  ctx2.stroke();

  // Pointer
  ctx2.beginPath();
  ctx2.moveTo(cx, cy);
  ctx2.lineTo(cx + Math.cos(angle) * r * 0.7, cy + Math.sin(angle) * r * 0.7);
  ctx2.strokeStyle = '#e8e0cc';
  ctx2.lineWidth = 1.5;
  ctx2.stroke();

  // Update value display
  document.getElementById(cfg.valId).textContent = cfg.fmt(cfg.value);
}

function makeKnobInteractive(canvas, cfg) {
  let startY, startVal;

  const onStart = (y) => { startY = y; startVal = cfg.value; };
  const onMove = (y) => {
    const delta = (startY - y) / 120;
    cfg.value = Math.max(cfg.min, Math.min(cfg.max, startVal + delta * (cfg.max - cfg.min)));
    cfg.onChange(cfg.value);
    drawKnob(canvas, cfg);
  };

  canvas.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('mousedown', e => { onStart(e.clientY);
    const mm = ev => onMove(ev.clientY);
    const mu = () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  });
}

// ============================================================
// VISUALS
// ============================================================
function startVisuals() {
  requestAnimationFrame(visualLoop);
}

const waveBuffers = {};

function visualLoop() {
  requestAnimationFrame(visualLoop);

  ['drums','bass','keys','digger'].forEach(m => {
    const analyser = analyserNodes[m];
    if (!analyser) return;

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);

    // VU
    let rms = 0;
    for (let i = 0; i < data.length; i++) {
      const s = (data[i] - 128) / 128;
      rms += s * s;
    }
    rms = Math.sqrt(rms / data.length);
    const vu = document.getElementById('vu-' + m);
    if (vu && state.musicians[m].playing) {
      vu.style.height = Math.min(100, rms * 600) + '%';
    } else if (vu) {
      vu.style.height = '0%';
    }

    // Waveform
    const wc = document.getElementById('wave-' + m);
    if (wc && state.musicians[m].playing) {
      const dpr = window.devicePixelRatio || 1;
      const w = wc.offsetWidth, h = wc.offsetHeight;
      if (w === 0) return;
      wc.width = w * dpr; wc.height = h * dpr;
      const c2 = wc.getContext('2d');
      c2.scale(dpr, dpr);
      c2.clearRect(0, 0, w, h);
      c2.beginPath();
      c2.strokeStyle = getAccentColor(m);
      c2.lineWidth = 1;
      for (let i = 0; i < data.length; i++) {
        const x = i / data.length * w;
        const y = ((data[i] - 128) / 128) * (h/2) + h/2;
        i === 0 ? c2.moveTo(x, y) : c2.lineTo(x, y);
      }
      c2.stroke();
    }
  });
}
